spring.application.name=MumbleBackend

#"Connect using MySQL JDBC driver to the database mumble_db running on localhost at port 3306.
#If the DB doesn't exist, create it.
#Use UTC timezone.
#Don't use SSL."
spring.datasource.url=jdbc:mysql://localhost:3306/mumble_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=mysql123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
